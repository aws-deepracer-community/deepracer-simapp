# Tox (http://tox.testrun.org/) is a tool for running tests
# in multiple virtualenvs. This configuration file will run the
# test suite on all supported Python versions. To use it, "pip install tox"
# and then run "tox" from this directory.

[tox]
envlist = py312,flake8
skip_missing_interpreters = False

[flake8]
max-line-length = 120
exclude =
    build/
    .git
    __pycache__
    .tox
    tests/data/
    venv/
max-complexity = 15

[testenv]
# TEAMCITY_VERSION environment variable exists during build on Teamcity. teamcity-messages uses it in order to enable
# reporting to TeamCity.
passenv =
    TEAMCITY_VERSION
    AWS_ACCESS_KEY_ID
    AWS_SECRET_ACCESS_KEY
    AWS_SESSION_TOKEN
# {posargs} can be passed in by additional arguments specified when invoking tox.
# Can be used to specify which tests to run, e.g.: tox -- -s
commands =
    coverage run --rcfile .coveragerc_{envname} --source sagemaker_containers -m py.test {posargs}
    {env:IGNORE_COVERAGE:} coverage report --rcfile .coveragerc_{envname}
    {env:IGNORE_COVERAGE:} coverage html --rcfile .coveragerc_{envname}
deps =
    pytest>=8.0.0
    pytest-cov>=4.1.0
    pytest-xdist>=3.5.0
    mock>=5.1.0
    teamcity-messages>=1.32
    awslogs>=0.14.0
    sagemaker>=2.200.0
    numpy>=1.26.0
    flask>=3.0.0
    gunicorn>=21.2.0
    gevent>=24.2.0

[testenv:flake8]
basepython = python
deps =
    flake8>=7.0.0
    pep8-naming>=0.13.3
    flake8-import-order>=0.18.2
commands = flake8

