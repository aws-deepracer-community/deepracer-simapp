/**/controller_manager:
  ros__parameters:
    use_sim_time: true
    update_rate: 60

    # Joint state broadcaster
    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

    # Wheel PID controllers (velocity reference -> velocity output, acts as smoother)
    left_rear_wheel_velocity_controller:
      type: pid_controller/PidController
    right_rear_wheel_velocity_controller:
      type: pid_controller/PidController
    left_front_wheel_velocity_controller:
      type: pid_controller/PidController
    right_front_wheel_velocity_controller:
      type: pid_controller/PidController

    # Steering position controllers
    left_steering_hinge_position_controller:
      type: position_controllers/JointGroupPositionController
    right_steering_hinge_position_controller:
      type: position_controllers/JointGroupPositionController

# Wheel PID controllers with gains
# Tuned for: effective_inertia=0.0187 kg·m², friction=0.9 Nm, damping=0.008 Nm/(rad/s)
# P reduced to avoid saturation during racing (2-4 m/s with sudden stops)
# Forward-only: car slows via friction (0.9 Nm) and damping (0.008), no reverse torque
/**/left_rear_wheel_velocity_controller:
  ros__parameters:
    dof_names: [left_rear_wheel_joint]
    reference_and_state_interfaces: [velocity]
    command_interface: effort
    gains:
      left_rear_wheel_joint:
        p: 0.035
        i: 0.300
        d: 0.000
        u_clamp_max: 5.0
        u_clamp_min: -0.5
        i_clamp_max: 0.9
        i_clamp_min: 0.0
        antiwindup_strategy: "conditional_integration"

/**/right_rear_wheel_velocity_controller:
  ros__parameters:
    dof_names: [right_rear_wheel_joint]
    reference_and_state_interfaces: [velocity]
    command_interface: effort
    gains:
      right_rear_wheel_joint:
        p: 0.035
        i: 0.300
        d: 0.000
        u_clamp_max: 5.0
        u_clamp_min: -0.5
        i_clamp_max: 0.9
        i_clamp_min: 0.0
        antiwindup_strategy: "conditional_integration"

/**/left_front_wheel_velocity_controller:
  ros__parameters:
    dof_names: [left_front_wheel_joint]
    reference_and_state_interfaces: [velocity]
    command_interface: effort
    gains:
      left_front_wheel_joint:
        p: 0.035
        i: 0.300
        d: 0.000
        u_clamp_max: 5.0
        u_clamp_min: -0.5
        i_clamp_max: 0.9
        i_clamp_min: 0.0
        antiwindup_strategy: "conditional_integration"

/**/right_front_wheel_velocity_controller:
  ros__parameters:
    dof_names: [right_front_wheel_joint]
    reference_and_state_interfaces: [velocity]
    command_interface: effort
    gains:
      right_front_wheel_joint:
        p: 0.035
        i: 0.300
        d: 0.000
        u_clamp_max: 5.0
        u_clamp_min: -0.5
        i_clamp_max: 0.9
        i_clamp_min: 0.0
        antiwindup_strategy: "conditional_integration"

# Steering position controllers with PID gains
/**/left_steering_hinge_position_controller:
  ros__parameters:
    joints: [left_steering_hinge_joint]

/**/right_steering_hinge_position_controller:
  ros__parameters:
    joints: [right_steering_hinge_joint]
