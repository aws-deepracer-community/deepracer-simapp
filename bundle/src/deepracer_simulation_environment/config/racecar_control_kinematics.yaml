/**/controller_manager:
  ros__parameters:
    use_sim_time: true
    update_rate: 60

    # Joint state broadcaster
    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

    # Wheel velocity controllers (for kinematic simulation)
    left_rear_wheel_velocity_controller:
      type: velocity_controllers/JointGroupVelocityController
    right_rear_wheel_velocity_controller:
      type: velocity_controllers/JointGroupVelocityController
    left_front_wheel_velocity_controller:
      type: velocity_controllers/JointGroupVelocityController
    right_front_wheel_velocity_controller:
      type: velocity_controllers/JointGroupVelocityController

    # Steering position controllers
    left_steering_hinge_position_controller:
      type: position_controllers/JointGroupPositionController
    right_steering_hinge_position_controller:
      type: position_controllers/JointGroupPositionController

# Wheel velocity controllers with PID gains (kinematic)
/**/left_rear_wheel_velocity_controller:
  ros__parameters:
    joints: [left_rear_wheel_joint]
    pid:
      p: 1.0
      i: 0.0
      d: 0.0
      i_clamp_min: 0.0
      i_clamp_max: 0.0

/**/right_rear_wheel_velocity_controller:
  ros__parameters:
    joints: [right_rear_wheel_joint]
    pid:
      p: 1.0
      i: 0.0
      d: 0.0
      i_clamp_min: 0.0
      i_clamp_max: 0.0

/**/left_front_wheel_velocity_controller:
  ros__parameters:
    joints: [left_front_wheel_joint]
    pid:
      p: 0.5
      i: 0.0
      d: 0.0
      i_clamp_min: 0.0
      i_clamp_max: 0.0

/**/right_front_wheel_velocity_controller:
  ros__parameters:
    joints: [right_front_wheel_joint]
    pid:
      p: 0.5
      i: 0.0
      d: 0.0
      i_clamp_min: 0.0
      i_clamp_max: 0.0

# Steering position controllers with PID gains
/**/left_steering_hinge_position_controller:
  ros__parameters:
    joints: [left_steering_hinge_joint]
    pid:
      p: 1.0
      i: 0.0
      d: 0.5
      i_clamp_min: 0.0
      i_clamp_max: 0.0

/**/right_steering_hinge_position_controller:
  ros__parameters:
    joints: [right_steering_hinge_joint]
    pid:
      p: 1.0
      i: 0.0
      d: 0.5
      i_clamp_min: 0.0
      i_clamp_max: 0.0