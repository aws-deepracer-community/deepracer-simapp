name: sagemaker_env
channels:
  - conda-forge
  - defaults
dependencies:
  - python=3.12
  - pip
  - numpy==1.26.4          # conda-managed so cv2/TF share one C-API instance
  - ffmpeg=8.0.1=gpl_*     # GPL variant includes x264 for AVC1/H.264 encoding
  - py-opencv              # headless cv2 bindings, uses the ffmpeg above
  - nginx
  - zip
  - wget
  - pyqt=5
  - curl==8.19.0
  - pip:
      - pygame==2.6.1
      - shapely==2.0.2
      - annoy==1.17.3
      - pillow==12.2.0
      - matplotlib==3.10.6
      - pandas==2.3.1
      - PyOpenGL==3.1.9
      - scipy==1.13.1
      - scikit-image==0.25.2
      - boto3==1.38.38
      - minio==7.2.15
      - cryptography==46.0.7
      - kubernetes==33.1.0
      - bokeh==3.7.3
      - /opt/amazon/rl_coach  # Install rl_coach from local source directory
      - retrying==1.4.1
      - eventlet==0.40.3
      - flask==3.1.1
      - Flask-Testing==0.8.1
      - gevent==23.9.1
      - gunicorn==23.0.0
      - h5py==3.14.0
      - pytest==8.3.4
      - pytest-cov==6.0.0
      - tensorflow==2.20.0
      - tensorflow-probability==0.25.0
      - protobuf==6.33.5
      - pyparsing==3.2.5
      - requests==2.32.5
      - urllib3==2.6.3
      - docutils==0.21.2
      - rospkg==1.6.0
      - tokenize-rt==6.2.0
      - pyyaml==6.0.3
      - pytz==2025.2
      - kiwisolver==1.4.9
      - pluggy==1.6.0
      - empy==4.2
      - jsonschema==4.24.0
      - typeguard==4.4.4
      - lark==1.2.2
      - catkin_pkg==1.0.0
      - pytelegraf
      - argcomplete
      - setuptools==80.10.2